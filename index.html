<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimePilot Ver.2.1 - Hybrid System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* デフォルトは漆黒（DARK） */
        :root {
            --bg: #05070c;
            --card: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.04);
            --accent: #00e5ff;
            --muted: #475569;
            --text: #f8fafc;
            --input-bg: rgba(255, 255, 255, 0.02);
            --nav-bg: rgba(5, 7, 12, 0.85);
            --header-bg: rgba(5, 7, 12, 0.8);
        }

        /* ライトモード（LIGHT） */
        body.light-theme {
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --accent: #00b4d8;
            --muted: #94a3b8;
            --text: #0f172a;
            --input-bg: #f1f5f9;
            --nav-bg: rgba(248, 250, 252, 0.85);
            --header-bg: rgba(248, 250, 252, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; transition: background 0.2s, color 0.2s, border-color 0.2s; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 100px; -webkit-font-smoothing: antialiased; }

        header {
            position: sticky; top: 0; z-index: 100;
            background: var(--header-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 13px; font-weight: 900; letter-spacing: 4px; opacity: 0.9; }
        .header-actions { display: flex; gap: 16px; align-items: center; }
        .theme-toggle { background: none; border: none; color: var(--text); font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer; opacity: 0.6; }
        .sos-trigger { background: none; border: none; color: #ff0055; font-size: 15px; cursor: pointer; padding: 4px; opacity: 0.8; }

        .container { max-width: 440px; margin: 0 auto; padding: 0 20px; }
        .app-page { display: none; }
        .app-page.active { display: block; animation: mgaSlide 0.25s ease-out; }
        @keyframes mgaSlide { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .weather-minimal { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-bottom: 20px; text-transform: uppercase; }
        .ai-text { font-size: 12px; font-weight: 500; line-height: 1.7; color: var(--text); opacity: 0.8; margin-bottom: 24px; letter-spacing: 0.3px; }

        /* タイムライン表示 */
        .tl-container { position: relative; padding-left: 16px; border-left: 1px solid var(--border); }
        .tl-item { position: relative; padding-bottom: 24px; }
        .tl-dot { position: absolute; left: -20px; top: 5px; width: 7px; height: 7px; background: var(--border); border-radius: 50%; }
        .tl-item.active .tl-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .tl-time { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 2px; }
        .tl-item.active .tl-time { color: var(--accent); }
        .tl-title { font-size: 13px; font-weight: 700; }
        .tl-desc { font-size: 11px; color: var(--muted); margin-top: 1px; }

        /* カレンダー */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 12px; font-weight: 800; letter-spacing: 1px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-w { text-align: center; font-size: 8px; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; color: var(--muted); cursor: pointer; border-radius: 6px; }
        .cal-cell:hover { background: var(--card); }
        .cal-cell.today { color: var(--accent); font-weight: 700; }
        .cal-cell.has-events { color: var(--text); font-weight: 600; }
        .cal-dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; margin-top: 2px; display: none; }
        .cal-cell.has-events .cal-dot { display: block; }

        /* プラン作成画面・スケジュール組み立て用 */
        .page-title-sub { font-size: 10px; font-weight: 800; color: var(--muted); letter-spacing: 1.5px; margin: 20px 0 10px 0; text-transform: uppercase; }
        .plan-input-group { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .plan-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .plan-row:last-child { margin-bottom: 0; }

        /* 天敵アプリのアイコン選択 */
        .app-selector { display: flex; gap: 12px; margin-bottom: 20px; }
        .app-opt { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 0; text-align: center; cursor: pointer; color: var(--muted); }
        .app-opt i { font-size: 18px; margin-bottom: 6px; display: block; }
        .app-opt span { font-size: 9px; font-weight: 700; display: block; }
        .app-opt.selected { border-color: var(--accent); color: var(--accent); background: rgba(0, 229, 255, 0.03); }

        /* 入力UIコンポーネント */
        .select-row { display: flex; gap: 8px; margin-bottom: 14px; }
        select, input { flex: 1; background: var(--input-bg); border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-size: 12px; color: var(--text); outline: none; -webkit-appearance: none; }
        input::placeholder { color: var(--muted); }

        .btn-action { width: 100%; background: var(--text); color: var(--bg); border: none; padding: 14px; border-radius: 24px; font-size: 12px; font-weight: 800; cursor: pointer; letter-spacing: 1px; }
        .btn-action:active { transform: scale(0.98); opacity: 0.9; }

        /* モーダル（プラン作成用） */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,7,12,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { width: 90%; max-width: 360px; background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }

        /* UX大改善：押しやすさを極めた大型ボトムナビ */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding: 0; z-index: 100; height: 68px; }
        .nav-item { background: none; border: none; color: var(--muted); display: flex; flex-direction: column; justify-content: center; align-items: center; flex: 1; cursor: pointer; height: 100%; position: relative; }
        .nav-item i { font-size: 18px; margin-bottom: 4px; }
        .nav-item span { font-size: 8px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
        .nav-item.active { color: var(--accent); }
        .nav-item::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 0; height: 3px; background: var(--accent); transition: width 0.2s; border-radius: 3px 3px 0 0; }
        .nav-item.active::after { width: 24px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PILOT // 2.1</div>
        <div class="header-actions">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">LIGHT</button>
            <button class="sos-trigger" onclick="triggerSOS()"><i class="fa-solid fa-bolt"></i></button>
        </div>
    </header>

    <div class="container">
        <div id="page-home" class="app-page active">
            <div class="weather-minimal" id="home-weather">SYNC REQUIRED //</div>
            <div class="ai-text" id="home-ai-text">「PLAN」タブから今日の予定と天敵アプリを設定し、時間最適化プランをビルドしてください。</div>
            <div class="tl-container" id="timeline-list">
                </div>
        </div>

        <div id="page-calendar" class="app-page">
            <div class="cal-header">
                <span onclick="moveMonth(-1)" style="cursor:pointer; padding: 10px; opacity:0.5;"><i class="fa-solid fa-chevron-left"></i></span>
                <span id="calendar-title">2026 / 07</span>
                <span onclick="moveMonth(1)" style="cursor:pointer; padding: 10px; opacity:0.5;"><i class="fa-solid fa-chevron-right"></i></span>
            </div>
            <div class="cal-grid" id="calendar-grid"></div>
        </div>

        <div id="page-plan" class="app-page">
            <div class="page-title-sub">1. Target Temptation App</div>
            <div class="app-selector">
                <div class="app-opt selected" onclick="selectApp('Instagram / TikTok', this)">
                    <i class="fa-brands fa-instagram"></i><span>SNS</span>
                </div>
                <div class="app-opt" onclick="selectApp('YouTube / Netflix', this)">
                    <i class="fa-solid fa-play"></i><span>VIDEO</span>
                </div>
                <div class="app-opt" onclick="selectApp('スマホゲーム全般', this)">
                    <i class="fa-solid fa-gamepad"></i><span>GAME</span>
                </div>
            </div>

            <div class="page-title-sub">2. Daily Fixed Schedule Plan</div>
            <div class="plan-input-group">
                <div class="plan-row">
                    <input type="text" id="plan-title-1" placeholder="予定1 (例: 学校・講義)" value="大学の講義">
                    <input type="text" id="plan-time-1" placeholder="時間 (例: 09:00-12:00)" style="max-width: 120px;" value="09:00-12:00">
                </div>
                <div class="plan-row">
                    <input type="text" id="plan-title-2" placeholder="予定2 (例: バイト・課題)" value="自習・課題作成">
                    <input type="text" id="plan-time-2" placeholder="時間 (例: 15:00-18:00)" style="max-width: 120px;" value="15:00-17:30">
                </div>
                <div class="plan-row">
                    <input type="text" id="plan-title-3" placeholder="予定3 (自由入力)">
                    <input type="text" id="plan-time-3" placeholder="時間" style="max-width: 120px;">
                </div>
            </div>

            <button class="btn-action" id="gen-btn" onclick="buildAISchedule()">OPTIMIZE TIME PLAN</button>
        </div>

        <div id="page-setting" class="app-page">
            <div class="page-title-sub">Location Sync</div>
            <div class="select-row">
                <select id="pref-select" onchange="updateCities()"></select>
                <select id="city-select"></select>
            </div>
            <button class="btn-action" style="background: var(--card); color: var(--text); margin-bottom: 24px; border: 1px solid var(--border);" onclick="saveLocation()">SYNC LOCATION</button>
            
            <div class="page-title-sub">API Integration</div>
            <input type="text" id="api-key" placeholder="Groq API Key (gsk_...)">
        </div>
    </div>

    <div class="modal" id="event-modal">
        <div class="modal-content">
            <div class="page-title-sub" id="modal-date-label">EDIT DAY PLAN</div>
            <input type="text" id="modal-event-title" placeholder="MAIN EVENT TITLE" style="margin-bottom: 10px;">
            <input type="text" id="modal-event-time" placeholder="TIME (e.g. 13:00-15:00)" style="margin-bottom: 16px;">
            <div style="display: flex; gap: 8px;">
                <button class="btn-action" style="background: var(--card); color:var(--text); border:1px solid var(--border);" onclick="closeModal()">BACK</button>
                <button class="btn-action" onclick="saveDirectEvent()">SAVE TO CALENDAR</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home', this)"><i class="fa-solid fa-home"></i><span>HOME</span></button>
        <button class="nav-item" onclick="switchTab('calendar', this)"><i class="fa-solid fa-calendar-alt"></i><span>CALENDAR</span></button>
        <button class="nav-item" onclick="switchTab('plan', this)"><i class="fa-solid fa-wand-magic-sparkles"></i><span>PLAN</span></button>
        <button class="nav-item" onclick="switchTab('setting', this)"><i class="fa-solid fa-sliders"></i><span>SETTING</span></button>
    </nav>

            const str = localStorage.getItem('tp21_city_data'); const pref = localStorage.getItem('tp21_pref_name') || "";

            try {

                let cond = "CLEAR ☀️"; if(code >= 1 && code <= 3) cond = "CLOUDY ☁️"; if(code >= 45) cond = "RAIN ☔";

            for (let i = 0; i < first; i++) { let e = document.createElement('div'); e.className = 'cal-cell'; e.style.opacity = 0; grid.appendChild(e); }
            const today = new Date();
            for (let d = 1; d <= last; d++) {
                let cell = document.createElement('div'); cell.className = 'cal-cell'; cell.innerHTML = `<div>${d}</div><div class="cal-dot"></div>`;
                const key = `${y}-${m+1}-${d}`; if(evs[key]) cell.classList.add('has-events');
                if(y === today.getFullYear() && m === today.getMonth() && d === today.getDate()) cell.classList.add('today');
                cell.onclick = () => {
                    selectedDateKey = key;
                    document.getElementById('modal-date-label').innerText = `PLAN FOR ${y}/${m+1}/${d}`;
                    document.getElementById('modal-event-title').value = (evs[key] || {}).title || "";
                    document.getElementById('modal-event-time').value = (evs[key] || {}).time || "";
                    document.getElementById('event-modal').style.display = 'flex';
                };
                grid.appendChild(cell);
            }
        }
        function closeModal() { document.getElementById('event-modal').style.display = 'none'; }
        function saveDirectEvent() {
            const title = document.getElementById('modal-event-title').value; const time = document.getElementById('modal-event-time').value;
            let evs = JSON.parse(localStorage.getItem('tp21_events') || '{}');
            if(title) { evs[selectedDateKey] = { title, time }; } else { delete evs[selectedDateKey]; }
            localStorage.setItem('tp21_events', JSON.stringify(evs)); closeModal(); renderCalendarView();
        }

        async function buildAISchedule() {
            const key = document.getElementById('api-key').value.trim();
            const wStr = weatherCache ? `${weatherCache.name}: ${weatherCache.cond}(${weatherCache.temp}°C)` : "CLEAR";

            // プラン作成画面に入力された3つの固定スケジュールを回収
            let userSchedules = [];
            for(let i=1; i<=3; i++) {
                const t = document.getElementById(`plan-title-${i}`).value.trim();
                const tm = document.getElementById(`plan-time-${i}`).value.trim();
                if(t) userSchedules.push({ title: t, time: tm || "ANYTIME" });
            }
            if(userSchedules.length === 0) { userSchedules.push({ title: "FREE DAY", time: "ALL DAY" }); }

            const btn = document.getElementById('gen-btn'); btn.disabled = true; btn.innerText = "BUILDING TIMELINE...";

            if(key) {
                try {
                    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                        body: JSON.stringify({ 
                            model: "llama-3.1-8b-instant", 
                            messages: [{role: "user", content: `TimePilotCoach. Tasks: ${JSON.stringify(userSchedules)} Weather:『${wStr}』TargetApp:『${selectedAppVal}』. Create advice and complete hourly timeline block. Generate JSON object ONLY: {"bubble": "1 sentence advice within 100 letters", "timeline": [{"time": "XX:XX", "title": "name", "desc": "action", "active": true}]}`}], 
                            response_format: {type: "json_object"} 
                        })
                    });
                    const d = await res.json(); renderResult(JSON.parse(d.choices[0].message.content));
                } catch(e) { loadMockPlan(userSchedules); }
            } else { setTimeout(() => loadMockPlan(userSchedules), 800); }
            btn.disabled = false; btn.innerText = "OPTIMIZE TIME PLAN"; switchTab('home', document.querySelectorAll('.nav-item')[0]);
        }

        function loadMockPlan(schedules) {
            const w = weatherCache || { cond: "CLEAR ☀️", temp: "22", name: "TOKYO" };
            const isRain = w.cond.includes("RAIN");
            
            let timeline = [{time: "08:00", title: "MORNING ROUTINE ☀️", desc: "スマホを触る前に本日のタスクを目視確認。", active: true}];
            schedules.forEach(s => {
                timeline.push({time: s.time.split('-')[0] || "10:00", title: s.title.toUpperCase(), desc: "事前作成プラン通りにタスクを実行。", active: false});
                timeline.push({time: s.time.split('-')[1] || "12:00", title: `ANTI-${selectedAppVal.split(' / ')[0].toUpperCase()} ZONE 🛑`, desc: "タスク終了直後のスマホ誘惑をブロック。深呼吸を挟む。", active: true});
            });
            timeline.push({time: "22:00", title: "NIGHT RECOVERY 🌌", desc: "画面を完全にオフ。明日の時間価値を守る。", active: false});

            const mock = {
                bubble: `✦ 現在は${w.cond}。作成されたスケジュール計画に合わせ、${selectedAppVal}を開きやすい「タスク間の隙間時間」をすべてブロックしました。`,
                timeline: timeline
            };
            renderResult(mock);
        }

        function triggerSOS() {
            renderResult({
                bubble: `🚨 【EMERGENCY】誘惑ログを確認。責める必要はない。今ここから即リスタートできるタイムラインへ再マッピングしました。`,
                timeline: [
                    {time: "NOW", title: "BREATH RESET 🧠", desc: "端末の電源を10分オフ。深呼吸して仕切り直す。", active: true},
                    {time: "NEXT", title: "15MIN FOCUS", desc: "遅れを取り戻そうとせず、最初の1歩だけ手を付ける。", active: true}
                ]
            });
            switchTab('home', document.querySelectorAll('.nav-item')[0]);
        }

        function renderResult(data) {
            document.getElementById('home-ai-text').innerText = data.bubble;
            const container = document.getElementById('timeline-list'); container.innerHTML = "";
            data.timeline.forEach(t => {
                let item = document.createElement('div'); item.className = `tl-item ${t.active ? 'active' : ''}`;
                item.innerHTML = `<div class="tl-dot"></div><div class="tl-time">${t.time}</div><div class="tl-title">${t.title}</div><div class="tl-desc">${t.desc}</div>`;
                container.appendChild(item);
            });
        }
    </script>
</body>
</html>
