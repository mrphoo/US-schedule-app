<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimePilot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --brand-color: #2563eb;
            --brand-light: #eff6ff;
            --success: #10b981;
            --danger: #ef4444;
            --input-bg: #f1f5f9;
        }

        body.dark-theme {
            --bg-primary: #090d16;
            --bg-card: #131926;
            --border-color: #222c3f;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --brand-color: #3b82f6;
            --brand-light: rgba(59, 130, 246, 0.08);
            --input-bg: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER */
        header {
            width: 100%;
            max-width: 540px;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-card);
        }

        .brand-logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .brand-logo span {
            color: var(--brand-color);
        }

        .theme-toggle-btn {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 12px;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* CONTAINER & PAGE MANAGEMENT */
        .app-container {
            width: 100%;
            max-width: 540px;
            padding: 24px;
        }

        .app-page {
            display: none;
        }

        .app-page.active-page {
            display: block;
        }

        /* TYPOGRAPHY & CARDS */
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin: 24px 0 14px 0;
            text-transform: uppercase;
        }

        .content-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* HOME SCREEN INPUT FORMS (JAPANESE LOCALIZED) */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-row-twin {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        input, select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            outline: none;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--brand-color);
        }

        .live-sync-banner {
            font-size: 13px;
            font-weight: 600;
            color: var(--brand-color);
            background: var(--brand-light);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(37, 99, 237, 0.15);
        }

        /* PRIMARY START BUTTON */
        .start-action-btn {
            width: 100%;
            background: var(--brand-color);
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(37, 99, 237, 0.2);
        }

        .start-action-btn:active {
            transform: scale(0.99);
        }

        /* HIGH-DENSITY DYNAMIC TIMELINE */
        .timeline-container {
            position: relative;
            padding-left: 24px;
            border-left: 2px solid var(--border-color);
            margin-left: 10px;
            margin-top: 15px;
        }

        .timeline-node {
            position: relative;
            padding-bottom: 30px;
        }

        .timeline-marker {
            position: absolute;
            left: -32px;
            top: 4px;
            width: 14px;
            height: 14px;
            background: var(--bg-primary);
            border: 3px solid var(--border-color);
            border-radius: 50%;
            z-index: 10;
        }

        .timeline-node.current .timeline-marker {
            background: var(--brand-color);
            border-color: var(--brand-color);
        }

        .timeline-stamp {
            font-size: 12px;
            font-weight: 700;
            color: var(--brand-color);
            margin-bottom: 4px;
        }

        .timeline-bubble {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 12px;
        }

        .timeline-heading {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
        }

        .timeline-body {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.5;
        }

        /* CALENDAR COMPONENT (STRICT JAPANESE PRINT) */
        .calendar-summary-strip {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .summary-mini-tile {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .summary-mini-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .summary-mini-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--brand-color);
            margin-top: 4px;
        }

        .calendar-month-header {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            padding: 10px 0;
            color: var(--text-main);
        }

        .calendar-weekday-bar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .calendar-days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-day-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px;
            font-size: 14px;
            font-weight: 600;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
        }

        .calendar-day-cell.current-today {
            border-color: var(--brand-color);
            background: var(--brand-light);
        }

        .calendar-day-cell .indicator-dot {
            width: 5px;
            height: 5px;
            background: var(--brand-color);
            border-radius: 50%;
            align-self: center;
        }

        /* BOTTOM NAV BAR (STANDARD SYSTEM TABS) */
        .system-navigation-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            display: flex;
            height: 72px;
            z-index: 1000;
            justify-content: center;
        }

        .nav-tab-wrapper {
            width: 100%;
            max-width: 540px;
            display: flex;
        }

        .navigation-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }

        .navigation-tab i {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .navigation-tab span {
            font-size: 11px;
            font-weight: 600;
        }

        .navigation-tab.tab-active {
            color: var(--brand-color);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">Time<span>Pilot</span></div>
        <button class="theme-toggle-btn" onclick="toggleSystemTheme()" id="theme-btn-label">DARK MODE</button>
    </header>

    <div class="app-container">
        
        <div id="page-home" class="app-page active-page">
            <div class="live-sync-banner" id="geo-weather-status">
                <i class="fa-solid fa-cloud-sun"></i> 地理データ読み込み中...
            </div>

            <div class="content-card">
                <div class="form-group">
                    <label>今日の主要タスク</label>
                    <input type="text" id="input-task-name" placeholder="例: 数学の重要問題集を解く">
                </div>

                <div class="form-row-twin">
                    <div class="form-group">
                        <label>開始時刻</label>
                        <input type="time" id="input-start-time" value="16:00">
                    </div>
                    <div class="form-group">
                        <label>所要時間</label>
                        <select id="input-duration">
                            <option value="30">30分</option>
                            <option value="60" selected>60分</option>
                            <option value="90">90分</option>
                            <option value="120">120分</option>
                        </select>
                    </div>
                </div>

                <div class="form-row-twin">
                    <div class="form-group">
                        <label>制限したいアプリ</label>
                        <select id="input-restrict-app">
                            <option value="Instagram">Instagram</option>
                            <option value="TikTok">TikTok</option>
                            <option value="YouTube">YouTube</option>
                            <option value="X (Twitter)">X (Twitter)</option>
                            <option value="なし">特になし</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>現在の集中度</label>
                        <select id="input-focus-level">
                            <option value="高">高い (好調)</option>
                            <option value="普通" selected>普通 (通常)</option>
                            <option value="低">低い (疲労気味)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>メモ・補足</label>
                    <input type="text" id="input-notes" placeholder="例: スマホは机の引き出しにしまう">
                </div>

                <button class="start-action-btn" onclick="executeTimePilotProtocol()">START</button>
            </div>

            <div class="section-title">生成されたタイムライン</div>
            <div id="timeline-console-output" style="font-size: 14px; color: var(--text-muted); line-height: 1.5; padding: 10px 0;">
                パラメータを設定してSTARTボタンを押すと、最適化された時間計画がここに展開されます。
            </div>
            <div class="timeline-container" id="dynamic-timeline-list"></div>
        </div>

        <div id="page-calendar" class="app-page">
            <div class="calendar-summary-strip">
                <div class="summary-mini-tile">
                    <div class="summary-mini-label">Total Focus Time</div>
                    <div class="summary-mini-value">24.5 h</div>
                </div>
                <div class="summary-mini-tile">
                    <div class="summary-mini-label">Success Rate</div>
                    <div class="summary-mini-value">88.2%</div>
                </div>
            </div>

            <div class="content-card">
                <div class="calendar-month-header">2026年 7月</div>
                <div class="calendar-weekday-bar">
                    <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
                </div>
                <div class="calendar-days-grid" id="system-calendar-grid"></div>
            </div>
        </div>

        <div id="page-settings" class="app-page">
            <div class="section-title">観測地域設定</div>
            <div class="content-card">
                <div class="form-group">
                    <label>都道府県</label>
                    <select id="select-prefecture" onchange="onPrefectureChange()"></select>
                </div>
                <div class="form-group">
                    <label>主要都市・観測地点</label>
                    <select id="select-city"></select>
                </div>
                <button class="start-action-btn" style="background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border-color); box-shadow: none;" onclick="saveLocationPreference()">設定を保存して同期</button>
            </div>

            <div class="section-title">システム連携</div>
            <div class="content-card">
                <div class="form-group">
                    <label>LLM APIキー (Groq / OpenRouter)</label>
                    <input type="password" placeholder="api_key_xxxxxxxxxxxxxxxx">
                </div>
            </div>
        </div>

    </div>

    <nav class="system-navigation-bar">
        <div class="nav-tab-wrapper">
            <button class="navigation-tab tab-active" onclick="switchSystemTab('home', this)"><i class="fa-solid fa-house"></i><span>HOME</span></button>
            <button class="navigation-tab" onclick="switchSystemTab('calendar', this)"><i class="fa-solid fa-calendar-days"></i><span>Calendar</span></button>

        </div>
    </nav>

        function toggleSystemTheme() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('tp_theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
            refreshThemeButtonLabel();

        function refreshThemeButtonLabel() {
            const isDark = document.body.classList.contains('dark-theme');
            document.getElementById('theme-btn-label').innerText = isDark ? "LIGHT MODE" : "DARK MODE";
        }

        function initializePrefectureSelect() {
            const prefSelect = document.getElementById('select-prefecture');
            // 緯度の高い順(北から南へ)に厳密ソート
            Object.keys(masterGeoDatabase).sort((a, b) => masterGeoDatabase[b][0].lat - masterGeoDatabase[a][0].lat).forEach(p => {
                let opt = document.createElement('option');
                opt.value = p;
                opt.innerText = p;
                prefSelect.appendChild(opt);
            });
            onPrefectureChange();
        }

        function onPrefectureChange() {
            const pref = document.getElementById('select-prefecture').value;
            const citySelect = document.getElementById('select-city');
            citySelect.innerHTML = "";
            masterGeoDatabase[pref].forEach(c => {
                let opt = document.createElement('option');
                opt.value = JSON.stringify(c);
                opt.innerText = c.name;
                citySelect.appendChild(opt);
            });
        }

        async function saveLocationPreference() {
            const cityDataStr = document.getElementById('select-city').value;
            if (!cityDataStr) return;
            localStorage.setItem('tp_saved_city_node', cityDataStr);
            localStorage.setItem('tp_saved_pref_node', document.getElementById('prefecture-select' ? 'prefecture-select' : 'select-prefecture').value);
            await synchronizeWeatherStation();
            alert("位置情報を更新しました。HOME画面の環境適応ロジックに反映されます。");
        }

        async function synchronizeWeatherStation() {
            const savedCityStr = localStorage.getItem('tp_saved_city_node');
            const savedPref = localStorage.getItem('tp_saved_pref_node') || "北海道";
            let activeCity = savedCityStr ? JSON.parse(savedCityStr) : masterGeoDatabase["北海道"][0];
            
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${activeCity.lat}&longitude=${activeCity.lon}&current_weather=true&timezone=Asia%2FTokyo`);
                const data = await response.json();
                const temp = data.current_weather.temperature;
                cachedWeatherInfo = { currentTemp: temp, locationLabel: activeCity.name };
                document.getElementById('geo-weather-status').innerHTML = `<i class="fa-solid fa-circle-check"></i> ${savedPref}・${activeCity.name} と同期中 (気温: ${temp}°C) // 集中力補正: 最適`;
            } catch (e) {
                document.getElementById('geo-weather-status').innerHTML = `<i class="fa-solid fa-wifi"></i> 標準モード (オフラインデータで稼働中)`;
            }
        }

        function switchSystemTab(targetPage, element) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.navigation-tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(`page-${targetPage}`).classList.add('active-page');
            element.classList.add('tab-active');
        }

        function buildCalendarDisplay() {
            const grid = document.getElementById('system-calendar-grid');
            grid.innerHTML = "";
            // 7月を想定した31日間シミュレーション表示
            for (let day = 1; day <= 31; day++) {
                let cell = document.createElement('div');
                cell.className = 'calendar-day-cell' + (day === 9 ? ' current-today' : '');
                cell.innerHTML = `<div>${day}</div>`;
                if (day % 4 === 0 || day === 9) {
                    let dot = document.createElement('div');
                    dot.className = 'indicator-dot';
                    cell.appendChild(dot);
                }
                grid.appendChild(cell);
            }
        }

        // STARTボタン押下時の動的高密度タイムライン展開ロジック
        function executeTimePilotProtocol() {
            const task = document.getElementById('input-task-name').value;
            const startTimeStr = document.getElementById('input-start-time').value;
            const duration = parseInt(document.getElementById('input-duration').value);
            const app = document.getElementById('input-restrict-app').value;
            const focus = document.getElementById('input-focus-level').value;
            const notes = document.getElementById('input-notes').value || "特になし";

            if (!task) {
                alert("タスク名を入力してください。");
                return;
            }

            let [h, m] = startTimeStr.split(':').map(Number);
            let timelineBaseDate = new Date();
            timelineBaseDate.setHours(h, m, 0);

            function calcTimeOffset(offset) {
                let d = new Date(timelineBaseDate.getTime() + offset * 60000);
                return ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
            }

            document.getElementById('timeline-console-output').innerHTML = `
                「<strong>${task}</strong>」のためのタイムラインを生成しました。<br>
                現在の環境要因（気温: ${cachedWeatherInfo.currentTemp}°C）および自己申告の集中度（${focus}）をもとに、${app === 'なし' ? '誘惑ノイズのない' : app + 'の誘惑を遮断する'}ルートを構築しています。
            `;

            const timelineList = document.getElementById('dynamic-timeline-list');
            timelineList.innerHTML = `
                <div class="timeline-node current">
                    <div class="timeline-marker"></div>
                    <div class="timeline-stamp">${calcTimeOffset(0)}</div>
                    <div class="timeline-bubble">
                        <div class="timeline-heading">ステップ 1: 環境のクリーンアップ</div>
                        <div class="timeline-body">タスクを阻害する【${app}】の通知を完全にオフにするか、スマートフォンを物理的に手の届かない場所に隔離します。</div>
                    </div>
                </div>

                <div class="timeline-node">
                    <div class="timeline-marker"></div>
                    <div class="timeline-stamp">${calcTimeOffset(3)}</div>
                    <div class="timeline-bubble">
                        <div class="timeline-heading">ステップ 2: 初期ブースト着手</div>
                        <div class="timeline-body">「${task}」の最初のステップ（ノートを開く、1行目を書くなど）に無条件で手を付けます。最初の3分を乗り越えることで、脳の作業興奮を引き出します。</div>
                    </div>
                </div>

                <div class="timeline-node">
                    <div class="timeline-marker"></div>
                    <div class="timeline-stamp">${calcTimeOffset(Math.floor(duration / 2))}</div>
                    <div class="timeline-bubble">
                        <div class="timeline-heading">ステップ 3: ミドルキープセッション</div>
                        <div class="timeline-body">最も中だるみが生じやすい時間帯です。事前に設定したメモ「${notes}」を再確認し、現在の良好なペースを落とさずに維持してください。</div>
                    </div>
                </div>

                <div class="timeline-node">
                    <div class="timeline-marker"></div>
                    <div class="timeline-stamp">${calcTimeOffset(duration - 5)}</div>
                    <div class="timeline-bubble">
                        <div class="timeline-heading">ステップ 4: ラストスプリント</div>
                        <div class="timeline-body">締め切り効果による集中力の最大化を狙います。残っている確認事項や最終調整をこの5分間で一気に片付けます。</div>
                    </div>
                </div>

                <div class="timeline-node">
                    <div class="timeline-marker"></div>
                    <div class="timeline-stamp">${calcTimeOffset(duration)}</div>
                    <div class="timeline-bubble">
                        <div class="timeline-heading">ステップ 5: セッション完了・ログ記録</div>
                        <div class="timeline-body">${duration}分間の集中セッションが完了しました。カレンダーに実績データが自動的に保存されます。次のステップに向けて少し脳を休ませてください。</div>
                    </div>
                </div>
            `;
        }
    </script>
