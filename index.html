<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimePilot - AI時間管理パーソナルコーチ</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #161f30;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-neon: #00f2fe;
            --accent-purple: #4facfe;
            --accent-green: #00ff87;
            --border-color: #23324d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, rgba(22,31,48,0.5) 0%, rgba(11,15,25,0) 100%);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--accent-neon), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        .hero h1 {
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-neon);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        select, input[type="text"], textarea {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }

        select:focus, input[type="text"]:focus, textarea:focus {
            border-color: var(--accent-neon);
        }

        .sub-input {
            margin-top: 10px;
            display: none;
            animation: fadeIn 0.3s ease-in-out forwards;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-neon));
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            margin-top: 10px;
        }

        .btn-submit:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-submit:disabled {
            background: #3a4b6e;
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
        }

        #result-section {
            display: none;
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-coach-box {
            background: linear-gradient(135deg, rgba(79,172,254,0.1) 0%, rgba(0,242,254,0.1) 100%);
            border-left: 4px solid var(--accent-neon);
            padding: 15px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 20px;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .ai-avatar {
            font-weight: bold;
            color: var(--accent-neon);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .timeline {
            position: relative;
            margin-left: 10px;
            padding-left: 20px;
            border-left: 2px solid var(--border-color);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 20px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--border-color);
            border: 2px solid var(--bg-color);
        }

        .timeline-item.active::before {
            background-color: var(--accent-neon);
            box-shadow: 0 0 8px var(--accent-neon);
        }

        .timeline-time {
            font-size: 12px;
            color: var(--accent-purple);
            font-weight: bold;
        }

        .timeline-title {
            font-size: 15px;
            font-weight: bold;
            margin: 2px 0;
        }

        .timeline-desc {
            font-size: 13px;
            color: var(--text-muted);
            white-space: pre-wrap;
        }

        .share-box {
            text-align: center;
            margin-top: 25px;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }

        .api-key-box {
            background-color: #1a1625;
            border: 1px solid #4a2b6d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 12px;
        }

        .api-key-box p {
            margin-bottom: 6px;
            color: #d6bbf2;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            font-size: 11px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">✦ TimePilot</div>
    </header>

    <div class="container">
        
        <section class="hero">
            <h1>スマホに奪われた時間を、自分の未来に変える。</h1>
            <p>あなた専用のパーソナルAIタイムコーチ</p>
        </section>

        <section class="card" id="form-section">
            <div class="card-title">🤖 AIスケジュール診断</div>

            <div class="api-key-box">
                <p>🔑 【デモ用設定】本物のAIで分析を行うにはGemini APIキーを入力してください：</p>
                <input type="text" id="api-key" placeholder="AIzaSy..." style="padding: 8px; font-size: 12px;">
                <span style="color: var(--text-muted); font-size: 10px; display:block; margin-top:4px;">※キーはサーバーに送信されず、あなたのブラウザ上でのみ直接AI通信に使用されます。未入力の場合は、従来通りの模擬シミュレーションが動作します。</span>
            </div>
            
            <div class="form-group">
                <label for="user-type">あなたの属性</label>
                <select id="user-type" onchange="toggleCustomInput('user-type', 'user-type-custom')">
                    <option value="高校生">高校生</option>
                    <option value="大学生">大学生</option>
                    <option value="若手社会人">若手社会人</option>
                    <option value="中学生">中学生</option>
                    <option value="その他">その他（自由記述）</option>
                </select>
                <input type="text" id="user-type-custom" class="sub-input" placeholder="例：受験生、フリーランス、部活生など">
            </div>

            <div class="form-group">
                <label for="goal">今日の最も重要な目標</label>
                <select id="goal" onchange="toggleCustomInput('goal', 'goal-custom')">
                    <option value="定期テスト・試験勉強">定期テスト・試験勉強</option>
                    <option value="資格取得・スキルアップ">資格取得・スキルアップ</option>
                    <option value="部活動・スポーツの自主練">部活動・スポーツの自主練</option>
                    <option value="読書・趣味の充実">読書・趣味の充実</option>
                    <option value="ダイエット・ボディメイク">ダイエット・ボディメイク</option>
                    <option value="睡眠・生活リズム改善">睡眠・生活リズム改善</option>
                    <option value="その他">その他（自由記述）</option>
                </select>
                <input type="text" id="goal-custom" class="sub-input" placeholder="例：イラストの練習、プログラミング、部屋の片付けなど">
            </div>

            <div class="form-group">
                <label for="fixed-schedule">今日の外せない予定（時間と内容を自由に入力してください）</label>
                <textarea id="fixed-schedule" placeholder="例：&#13;9:00〜16:00 学校&#13;17:30〜20:00 バイト"></textarea>
            </div>

            <div class="form-group">
                <label for="smartphone-trap">ついスマホを無駄に見がちな時間帯</label>
                <select id="smartphone-trap">
                    <option value="朝、起きてすぐ">朝、起きてすぐ</option>
                    <option value="通学・通勤の移動中">通学・通勤の移動中</option>
                    <option value="帰宅してからのダラダラ時間">帰宅してからのダラダラ時間</option>
                    <option value="ベッドに入ってから寝るまで">ベッドに入ってから寝るまで</option>
                </select>
            </div>

            <button class="btn-submit" id="submit-btn" onclick="generateAISchedule()">AIにスケジュールを作ってもらう</button>
        </section>

        <section class="card" id="result-section">
            <div class="card-title">✨ 今日のAI最適化プラン</div>
            
            <div class="ai-coach-box">
                <div class="ai-avatar">✨ AIライフコーチからの助言</div>
                <div id="ai-message">AIがあなたのスケジュールを最適化中...</div>
            </div>

            <div class="timeline" id="timeline-container">
                </div>

            <div class="share-box">
                <button class="btn-secondary" onclick="resetForm()">もう一度診断する</button>
            </div>
        </section>

        <footer>
            <p>© 2026 TimePilot Project. All rights reserved.</p>
        </footer>

    </div>

    <script>
        // 「その他」を選んだときに自由記述欄を出す制御
        function toggleCustomInput(selectId, customId) {
            const selectEl = document.getElementById(selectId);
            const customEl = document.getElementById(customId);
            if (selectEl.value === 'その他') {
                customEl.style.display = 'block';
                customEl.required = true;
            } else {
                customEl.style.display = 'none';
                customEl.required = false;
            }
        }

        // スケジュール生成メインロジック
        async class AIService {
            static async fetchFromGemini(apiKey, prompt) {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                if (!response.ok) throw new Error('API通信に失敗しました。キーが正しいか確認してください。');
                const data = await response.json();
                return JSON.parse(data.candidates[0].content.parts[0].text);
            }
        }

        async function generateAISchedule() {
            // 値の取得
            let userType = document.getElementById('user-type').value;
            if (userType === 'その他') userType = document.getElementById('user-type-custom').value;

            let goal = document.getElementById('goal').value;
            if (goal === 'その他') goal = document.getElementById('goal-custom').value;

            const fixedSchedule = document.getElementById('fixed-schedule').value || "特になし";
            const trap = document.getElementById('smartphone-trap').value;
            const apiKey = document.getElementById('api-key').value.trim();

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "AIが思考中...";

            // 結果画面の準備表示
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('ai-message').innerText = "あなたの生活習慣と目標を分析し、最適なスケジュールを20秒ほどで構築しています...";
            document.getElementById('timeline-container').innerHTML = "";

            if (apiKey) {
                // ④ 実際のAI（Gemini API）を呼び出す処理
                const systemPrompt = `
                あなたは15〜25歳の若者に寄り添う優秀なAIタイムコーチ「TimePilot」です。
                ユーザーから与えられた情報をもとに、スマホの無駄な時間を削減しつつ、目標を達成するための「1日の最適スケジュール」と「コーチの助言」を必ず以下の【指定のJSON形式のみ】で出力してください。

                【ユーザー情報】
                - 属性: ${userType}
                - 今日の目標: ${goal}
                - 外せない予定: ${fixedSchedule}
                - スマホの誘惑に負けがちな時間帯: ${trap}

                【条件】
                1. 予定に合わせて、スマホの利用を制限・管理する「スマホコントロール時間（📱）」や、目標に集中する「極大集中タイム（🔥）」をスケジュールの中に自然に組み込んでください。
                2. coachMessageは、若者の心に響く、優しくも的確な150文字程度のアドバイスにしてください。
                3. timeline配列の中の各オブジェクトは、time, title, desc, active(重要な時間ならtrue)の4つのキーを正確に持たせてください。

                【出力するJSONフォーマット】
                {
                  "coachMessage": "AIコーチからの励ましやスマホ対策のアドバイス",
                  "timeline": [
                    { "time": "時間帯(例: 17:00-18:00)", "title": "予定タイトル", "desc": "具体的な行動内容やスマホ対策の指示", "active": true },
                    { "time": "時間帯(例: 18:00-19:30)", "title": "予定タイトル", "desc": "行動内容", "active": false }
                  ]
                }
                `;

                try {
                    const result = await AIService.fetchFromGemini(apiKey, systemPrompt);
                    renderResult(result.coachMessage, result.timeline);
                } catch (error) {
                    alert("リアルAIの呼び出しに失敗しました。モックデータに切り替えます。エラー原因: " + error.message);
                    generateMockSchedule(userType, goal, fixedSchedule, trap);
                }
            } else {
                // APIキーがない場合は、すぐ動く高精度なシミュレーションを実行
                setTimeout(() => {
                    generateMockSchedule(userType, goal, fixedSchedule, trap);
                }, 1000);
            }

            submitBtn.disabled = false;
            submitBtn.innerText = "AIにスケジュールを作ってもらう";
        }

        // 模擬（モック）生成ロジック
        function generateMockSchedule(userType, goal, fixedSchedule, trap) {
            const coachMessage = `【デモモード】${userType}のあなたへ。つい「${trap}」にスマホを触ってしまう癖をAIが先回りしてブロックします。今日の重要目標である『${goal}』と、お聞きした固定予定【${fixedSchedule}】のバランスを考慮し、スマホを触る暇を与えない最適タイムラインを組みました。`;
            
            const timeline = [
                { time: "08:00 - 08:30", title: "朝のスマホコントロール 📱", desc: `「${trap}」の誘惑に勝つため、最初の30分は通知をミュートに。`, active: false },
                { time: "各固定予定の時間", title: "外せない予定の消化", desc: `入力された予定【${fixedSchedule}】を確実にこなす時間。`, active: false },
                { time: "18:00 - 20:00", title: "TimePilot 極大集中ゾーン 🔥", desc: `ここが今日の一番の勝負どころ。『${goal}』に全エネルギーを注ぎましょう！`, active: true },
                { time: "22:00 - 22:30", title: "自由スマホ許可タイム", desc: "1日頑張ったご褒美。アラームをセットしてダラダラ防止。", active: false }
            ];

            renderResult(coachMessage, timeline);
        }

        // 画面への描画
        function renderResult(coachMessage, timeline) {
            document.getElementById('ai-message').innerText = coachMessage;
            const container = document.getElementById('timeline-container');
            container.innerHTML = "";

            timeline.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `timeline-item ${item.active ? 'active' : ''}`;
                itemDiv.innerHTML = `
                    <div class="timeline-time">${item.time}</div>
                    <div class="timeline-title">${item.title}</div>
                    <div class="timeline-desc">${item.desc}</div>
                `;
                container.appendChild(itemDiv);
            });
        }

        function resetForm() {
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('form-section').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
