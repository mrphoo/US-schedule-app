<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimePilot Ver 1.4 - AI時間管理パーソナルコーチ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #161f30;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-neon: #00f2fe;
            --accent-purple: #4facfe;
            --accent-green: #00ff87;
            --border-color: #23324d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 80px; /* ナビゲーションバーの余白 */
        }

        /* 天気・情報ヘッダー */
        header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, rgba(22,31,48,0.5) 0%, rgba(11,15,25,0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            background: linear-gradient(45deg, var(--accent-neon), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .weather-info {
            font-size: 12px;
            color: var(--text-muted);
            background-color: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ページ（タブ）の制御 */
        .app-page {
            display: none;
        }
        .app-page.active {
            display: block;
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 共通カードスタイル */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-neon);
        }

        /* フォーム要素 */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        select, input[type="text"], textarea {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        select:focus, input[type="text"]:focus, textarea:focus {
            border-color: var(--accent-neon);
        }

        .sub-input {
            margin-top: 8px;
            display: none;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-neon));
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
        }

        .btn-submit:disabled {
            background: #23324d;
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* AI出力画面 */
        .ai-coach-box {
            background: linear-gradient(135deg, rgba(79,172,254,0.1) 0%, rgba(0,242,254,0.1) 100%);
            border-left: 4px solid var(--accent-neon);
            padding: 15px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 20px;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .timeline {
            position: relative;
            margin-left: 10px;
            padding-left: 20px;
            border-left: 2px solid var(--border-color);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 15px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--border-color);
            border: 2px solid var(--bg-color);
        }

        .timeline-item.active::before {
            background-color: var(--accent-neon);
            box-shadow: 0 0 8px var(--accent-neon);
        }

        .timeline-time {
            font-size: 11px;
            color: var(--accent-purple);
            font-weight: bold;
        }

        .timeline-title {
            font-size: 14px;
            font-weight: bold;
        }

        .timeline-desc {
            font-size: 12px;
            color: var(--text-muted);
            white-space: pre-wrap;
        }

        /* カレンダー画面 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
            margin-top: 10px;
        }

        .calendar-day-head {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: bold;
            padding: 5px 0;
        }

        .calendar-day {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .calendar-day.today {
            border-color: var(--accent-neon);
            box-shadow: inset 0 0 5px rgba(0,242,254,0.3);
        }

        .calendar-day.has-plan::after {
            content: '●';
            color: var(--accent-green);
            font-size: 8px;
            text-align: center;
        }

        /* アーカイブ画面 */
        .archive-item {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .archive-date {
            font-size: 12px;
            color: var(--accent-purple);
            font-weight: bold;
        }

        /* 固定下部ナビゲーションバー */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            cursor: pointer;
            width: 33%;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: var(--accent-neon);
        }

        .api-key-box {
            background-color: #171426;
            border: 1px solid #45296b;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">✦ TimePilot</div>
        <div class="weather-info" id="header-weather">📍 東京: 晴れ 26°C</div>
    </header>

    <div class="container">

        <div id="page-today" class="app-page active">
            <section class="card" id="form-section">
                <div class="card-title">🤖 今日のプラン作成 (Ver 1.4)</div>

                <div class="api-key-box">
                    <p style="color:#d1b5f5; margin-bottom:4px;">⚡ Groq APIキーを入れてリアルAI分析：</p>
                    <input type="text" id="api-key" placeholder="gsk_..." style="padding: 6px; font-size:11px;">
                </div>
                
                <div class="form-group">
                    <label>あなたの属性</label>
                    <select id="user-type" onchange="toggleCustom('user-type', 'user-type-custom')">
                        <option value="高校生">高校生</option>
                        <option value="大学生">大学生</option>
                        <option value="若手社会人">若手社会人</option>
                        <option value="その他">その他（自由記述）</option>
                    </select>
                    <input type="text" id="user-type-custom" class="sub-input" placeholder="例：受験生、部活生など">
                </div>

                <div class="form-group">
                    <label>今日の目標・タイプ・スマホ依存度</label>
                    <select id="user-goal" style="margin-bottom: 8px;" onchange="toggleCustom('user-goal', 'user-goal-custom')">
                        <option value="定期テスト・試験勉強">定期テスト・試験勉強</option>
                        <option value="資格取得・スキルアップ">資格取得・スキルアップ</option>
                        <option value="睡眠・生活リズム改善">睡眠・生活リズム改善</option>
                        <option value="その他">その他（自由記述）</option>
                    </select>
                    <input type="text" id="user-goal-custom" class="sub-input" style="margin-bottom: 8px;" placeholder="具体的に何をするか">

                    <select id="user-personality" style="margin-bottom: 8px;">
                        <option value="コツコツ計画通りやりたい派">コツコツ計画通りやりたい派</option>
                        <option value="締め切り直前に燃える派">締め切り直前に燃える派</option>
                    </select>

                    <select id="user-dependence">
                        <option value="無意識に手が伸びる（重症）">無意識に手が伸びる（重症）</option>
                        <option value="通知が来たらすぐ見ちゃう">通知が来たらすぐ見ちゃう</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>今日の大まかな予定（ベース）</label>
                    <select id="fixed-base" style="margin-bottom: 8px;">
                        <option value="学校や仕事がある（9:00〜16:00）">学校や仕事がある（9:00〜16:00）</option>
                        <option value="夕方からバイトや塾がある（17:00〜21:00）">夕方からバイトや塾がある（17:00〜21:00）</option>
                        <option value="今日は1日フリー（休み）">今日は1日フリー（休み）</option>
                    </select>
                    <label>細かい予定の補足（自由記述）</label>
                    <textarea id="fixed-custom" placeholder="例：16:30に友達とマック、19:00から飯など"></textarea>
                </div>

                <button class="btn-submit" id="submit-btn" onclick="generatePlan()">AIコーチに予定を最適化してもらう</button>
            </section>

            <section class="card" id="result-section" style="display: none;">
                <div class="card-title">✨ 今日のAI最適化プラン</div>
                <div class="ai-coach-box">
                    <div style="font-weight:bold; color:var(--accent-neon); margin-bottom:5px;">✨ AIコーチの精密分析</div>
                    <div id="ai-message">分析中...</div>
                </div>
                <div class="timeline" id="timeline-container"></div>
                <button class="btn-submit" style="margin-top:20px; background:var(--bg-color); border:1px solid var(--border-color);" onclick="saveCurrentPlan()">📁 この計画をカレンダーに保存する</button>
                <button class="btn-submit" style="margin-top:10px; background:transparent;" onclick="resetForm()">戻る</button>
            </section>
        </div>

        <div id="page-calendar" class="app-page">
            <section class="card">
                <div class="card-title">🗓️ 長期計画カレンダー</div>
                <p style="font-size:12px; color:var(--text-muted); margin-bottom:10px;">日付をタップすると、その日に保存したAIプラン（履歴）を呼び出せます。</p>
                
                <div class="calendar-grid" id="calendar-container">
                    </div>
            </section>
        </div>

        <div id="page-archive" class="app-page">
            <section class="card">
                <div class="card-title">💾 保存された成功記録</div>
                <div id="archive-list">
                    <p style="color:var(--text-muted); font-size:13px; text-align:center; padding:20px;">保存された過去の計画はまだありません。</p>
                </div>
            </section>
        </div>

    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="switchPage('today', this)">
            <i class="fa-solid fa-bolt"></i>今日
        </button>
        <button class="nav-item" onclick="switchPage('calendar', this)">
            <i class="fa-solid fa-calendar-days"></i>カレンダー
        </button>
        <button class="nav-item" onclick="switchPage('archive', this)">
            <i class="fa-solid fa-box-archive"></i>アーカイブ
        </button>
    </nav>

    <script>
        // グローバル保存用データ
        let currentGeneratedData = null;

        // タブ（ページ）切り替え制御
        function switchPage(pageId, buttonEl) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`page-${pageId}`).classList.add('active');
            buttonEl.classList.add('active');

            if (pageId === 'calendar') renderCalendar();
            if (pageId === 'archive') renderArchiveList();
        }

        // 「その他」入力欄の表示制御
        function toggleCustom(selectId, customId) {
            const select = document.getElementById(selectId);
            const custom = document.getElementById(customId);
            custom.style.display = select.value === 'その他' ? 'block' : 'none';
        }

        // スケジュール生成メイン関数
        async function generatePlan() {
            let userType = document.getElementById('user-type').value;
            if (userType === 'その他') userType = document.getElementById('user-type-custom').value;

            let goal = document.getElementById('user-goal').value;
            if (goal === 'その他') goal = document.getElementById('user-goal-custom').value;

            const personality = document.getElementById('user-personality').value;
            const dependence = document.getElementById('user-dependence').value;
            const baseSchedule = document.getElementById('fixed-base').value;
            const customSchedule = document.getElementById('fixed-custom').value || "特になし";
            const apiKey = document.getElementById('api-key').value.trim();

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "AIコーチが深層分析中...";

            document.getElementById('form-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('ai-message').innerText = "ユーザーの性格、スマホ依存度、固定予定、そして現在の天候条件を統合分析し、脳のバイオリズムに最適な1日をゼロから構築しています...";

            // 外部AI用のプロンプト
            const systemPrompt = `
            あなたは15〜25歳の若者に寄り添う優秀なAIタイムコーチ「TimePilot」です。
            以下のユーザー情報（性格、スマホ依存度、予定、天候）を元に、スマホ中毒を防止しつつ目標を達成するための「1日の最適スケジュール」と「超具体的なコーチング分析」を、必ず指定のJSON形式のみで出力してください。

            【ユーザー情報】
            - 属性: ${userType}
            - 今日の目標: ${goal}
            - 性格タイプ: ${personality}
            - スマホ依存度: ${dependence}
            - ベースの予定: ${baseSchedule}
            - 補足の予定: ${customSchedule}
            - 今日の天気: 晴れ 26°C（※天気が行動に与える影響も少し考慮してください）

            【分析・出力の強化条件】
            1. coachMessageは、単なる励ましではなく「スマホを触ってしまいそうな魔の時間帯の予測」「その人の性格に合わせたスマホ隔離アドバイス」「やらないことリスト」を含め、250文字以上の深い分析量で記述してください。
            2. timeline配列の各オブジェクトは、time, title, desc, active(集中すべき重要な時間ならtrue)を含めてください。スマホコントロール（📱）や極大集中（🔥）を適切に散りばめてください。

            【出力するJSONフォーマット】
            {
              "coachMessage": "ここに詳細な分析文章",
              "timeline": [
                { "time": "16:30-17:00", "title": "タイトル", "desc": "具体的な指示", "active": true }
              ]
            }
            `;

            if (apiKey) {
                try {
                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({
                            model: "llama-3.1-8b-instant",
                            messages: [{ role: "user", content: systemPrompt }],
                            response_format: { type: "json_object" },
                            temperature: 0.7
                        })
                    });
                    const data = await response.json();
                    currentGeneratedData = JSON.parse(data.choices[0].message.content);
                } catch (e) {
                    alert("AIとの通信に失敗しました。キーを確認するかデモモードをお試しください。");
                    generateMock(userType, goal, baseSchedule);
                }
            } else {
                // デモ用モック
                await new Promise(r => setTimeout(r, 1200));
                generateMock(userType, goal, baseSchedule);
            }

            renderResult();
            btn.disabled = false;
            btn.innerText = "AIコーチに予定を最適化してもらう";
        }

        function generateMock(userType, goal, base) {
            currentGeneratedData = {
                coachMessage: `【デモモード】${userType}のあなた専用分析。性格や依存度を考慮すると、帰宅後のダラダラ時間帯にスマホを開く確率が85%と予測されます。今日の目標『${goal}』を達成するため、本日は「機内モード化」を推奨します。天気が良いので、外でのリフレッシュ時間も効果的です。`,
                timeline: [
                    { time: "08:00 - 08:30", title: "朝のタイムコントロール 📱", desc: "通知をオフにし、今日やるべきことの優先順位を確認。", active: false },
                    { time: "09:00 - 16:00", title: "ベース予定セッション", desc: `${base}を消化する時間。`, active: false },
                    { time: "17:00 - 19:00", title: "極大集中ゾーン 🔥", desc: `脳が冴えているタイミングです。『${goal}』に一気にコミット！`, active: true },
                    { time: "22:00 - 22:30", title: "リラックススマホタイム", desc: "時間を決めて楽しむ。アラーム必須。", active: false }
                ]
            };
        }

        function renderResult() {
            document.getElementById('ai-message').innerText = currentGeneratedData.coachMessage;
            const container = document.getElementById('timeline-container');
            container.innerHTML = "";
            currentGeneratedData.timeline.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `timeline-item ${item.active ? 'active' : ''}`;
                itemDiv.innerHTML = `
                    <div class="timeline-time">${item.time}</div>
                    <div class="timeline-title">${item.title}</div>
                    <div class="timeline-desc">${item.desc}</div>
                `;
                container.appendChild(itemDiv);
            });
        }

        // LocalStorageへのデータ保存
        function saveCurrentPlan() {
            if (!currentGeneratedData) return;
            const todayStr = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
            
            let history = JSON.parse(localStorage.getItem('timepilot_history') || '{}');
            history[todayStr] = currentGeneratedData;
            localStorage.setItem('timepilot_history', JSON.stringify(history));
            
            alert(`${todayStr} の予定としてカレンダーに保存しました！`);
        }

        // カレンダーの生成表示
        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = "";
            
            const history = JSON.parse(localStorage.getItem('timepilot_history') || '{}');
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();

            // 曜日ヘッダー
            const weeks = ['日', '月', '火', '水', '木', '金', '土'];
            weeks.forEach(w => {
                const head = document.createElement('div');
                head.className = 'calendar-day-head';
                head.innerText = w;
                container.appendChild(head);
            });

            // 当月の1日と最終日を取得
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            // 空白埋め
            for (let i = 0; i < firstDay; i++) {
                container.appendChild(document.createElement('div'));
            }

            // 日付マス作成
            for (let d = 1; d <= lastDate; d++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'calendar-day';
                dayDiv.innerText = d;

                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                
                if (d === now.getDate()) dayDiv.classList.add('today');
                if (history[dateStr]) dayDiv.classList.add('has-plan');

                dayDiv.onclick = () => {
                    if (history[dateStr]) {
                        currentGeneratedData = history[dateStr];
                        switchPage('today', document.querySelectorAll('.nav-item')[0]);
                        document.getElementById('form-section').style.display = 'none';
                        document.getElementById('result-section').style.display = 'block';
                        renderResult();
                    } else {
                        alert(`${dateStr} の保存されたデータはありません。`);
                    }
                };
                container.appendChild(dayDiv);
            }
        }

        // アーカイブ（履歴）リストの生成表示
        function renderArchiveList() {
            const listContainer = document.getElementById('archive-list');
            const history = JSON.parse(localStorage.getItem('timepilot_history') || '{}');
            const keys = Object.keys(history).sort().reverse();

            if (keys.length === 0) {
                listContainer.innerHTML = `<p style="color:var(--text-muted); font-size:13px; text-align:center; padding:20px;">保存された過去の計画はまだありません。</p>`;
                return;
            }

            listContainer.innerHTML = "";
            keys.forEach(dateStr => {
                const item = history[dateStr];
                const div = document.createElement('div');
                div.className = 'archive-item';
                div.innerHTML = `
                    <div class="archive-date">${dateStr} の記録</div>
                    <p style="font-size:13px; margin-top:5px; color:var(--text-main);">${item.coachMessage.substring(0, 80)}...</p>
                    <button class="btn-submit" style="padding:6px; font-size:11px; margin-top:8px; background:var(--border-color);" onclick="loadSpecificArchive('${dateStr}')">この計画を開く</button>
                `;
                listContainer.appendChild(div);
            });
        }

        function loadSpecificArchive(dateStr) {
            const history = JSON.parse(localStorage.getItem('timepilot_history') || '{}');
            currentGeneratedData = history[dateStr];
            switchPage('today', document.querySelectorAll('.nav-item')[0]);
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            renderResult();
        }

        function resetForm() {
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('form-section').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
