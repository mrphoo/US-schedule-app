<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimePilot Ver.1.7 - Premium AI Minimalist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b0f19;
            --card-bg: rgba(20, 27, 45, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-purple: #818cf8;
            --accent-pink: #f472b6;
            --accent-green: #34d399;
            --border: rgba(255, 255, 255, 0.06);
            --glass-blur: blur(20px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #070a13; color: var(--text-main); min-height: 100vh; padding-bottom: 90px; }

        /* MGA APPスタイル・ヘッダー */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(7, 10, 19, 0.8); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 18px; font-weight: 800; letter-spacing: 1px; color: #fff; text-shadow: 0 0 12px rgba(56, 189, 248, 0.4); }
        .sos-trigger { background: linear-gradient(135deg, #ef4444, #f43f5e); border: none; width: 36px; height: 36px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); font-size: 14px; }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .app-page { display: none; }
        .app-page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* ミニマルカード */
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 16px; backdrop-filter: var(--glass-blur); }
        .section-title { font-size: 13px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 14px; text-transform: uppercase; }

        /* フォーム要素 */
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 11px; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; }
        select, input { width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border); padding: 12px 14px; border-radius: 12px; font-size: 14px; color: white; outline: none; }
        select:focus, input:focus { border-color: var(--accent-blue); }

        .btn-premium { width: 100%; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; border: none; padding: 14px; border-radius: 30px; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(129, 140, 248, 0.2); }

        /* MGA風洗練されたタイムライン */
        .timeline-item { padding-left: 20px; border-left: 2px solid var(--border); position: relative; padding-bottom: 20px; }
        .timeline-item::before { content: ''; position: absolute; left: -5px; top: 5px; width: 8px; height: 8px; background: var(--border); border-radius: 50%; }
        .timeline-item.active::before { background: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue); }
        .tl-time { font-size: 11px; font-weight: 700; color: var(--accent-blue); }
        .tl-title { font-size: 14px; font-weight: 700; margin: 2px 0; }
        .tl-desc { font-size: 12px; color: var(--text-muted); }

        /* AIメッセージ吹き出し（オマージュ） */
        .ai-bubble { background: rgba(56, 189, 248, 0.08); border: 1px solid rgba(56, 189, 248, 0.15); border-radius: 16px; padding: 14px; margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start; }
        .ai-bubble i { color: var(--accent-blue); font-size: 16px; margin-top: 2px; }
        .ai-bubble-text { font-size: 13px; font-weight: 500; line-height: 1.5; }

        /* TimeTree風カレンダーコア */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .weekday-label { text-align: center; font-size: 10px; font-weight: 700; color: var(--text-muted); }
        .calendar-cell { aspect-ratio: 1; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; justify-content: space-between; padding: 4px; font-size: 11px; cursor: pointer; }
        .calendar-cell.today { border: 1px solid var(--accent-blue); color: var(--accent-blue); }
        .calendar-cell.has-events { background: rgba(129, 140, 248, 0.15); border-color: rgba(129, 140, 248, 0.3); }
        .cell-dots { display: flex; gap: 2px; justify-content: center; min-height: 3px; }
        .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--accent-purple); }

        /* モーダルポップアップ */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #111827; border: 1px solid var(--border); padding: 20px; border-radius: 20px; width: 90%; max-width: 360px; }

        /* MGA APPオマージュ：最下部固定ボトムタブ */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(7, 10, 19, 0.85); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-top: 1px solid var(--border); display: flex; padding: 10px 0; z-index: 100; }
        .nav-item { background: none; border: none; color: var(--text-muted); font-size: 9px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; cursor: pointer; letter-spacing: 0.5px; transition: color 0.2s; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item i { font-size: 18px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">MGA × PILOT</div>
        <button class="sos-trigger" onclick="triggerSOS()" title="サボり救済SOS"><i class="fa-solid fa-bolt"></i></button>
    </header>

    <div class="container">

        <div id="page-home" class="app-page active">
            <div class="ai-bubble" id="home-ai-bubble">
                <i class="fa-solid fa-comment-dots"></i>
                <div class="ai-bubble-text" id="home-ai-text">「PLAN」タブから天敵アプリを設定して最適化すると、ここにあなただけのスマホ制限クエストとタイムラインが創出されます。</div>
            </div>
            
            <section class="card">
                <div class="section-title" id="timeline-date-label">TODAY'S SCHEDULE</div>
                <div id="timeline-list">
                    <p style="font-size: 13px; color: var(--text-muted); text-align: center; padding: 20px 0;">まだ本日のプランが生成されていません</p>
                </div>
            </section>
        </div>

        <div id="page-calendar" class="app-page">
            <section class="card">
                <div class="calendar-header">
                    <button onclick="moveMonth(-1)" style="background:none; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-chevron-left"></i></button>
                    <h4 id="calendar-title" style="font-weight: 800; font-size: 15px;">2026年 7月</h4>
                    <button onclick="moveMonth(1)" style="background:none; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </section>
        </div>

        <div id="page-plan" class="app-page">
            <section class="card">
                <div class="section-title">AI OPTIMIZER</div>
                <div class="form-group">
                    <label>つい触ってしまう天敵アプリ</label>
                    <select id="target-app">
                        <option value="Instagram / TikTok">Instagram / TikTok</option>
                        <option value="YouTube / Netflix">YouTube / Netflix</option>
                        <option value="スマホゲーム全般">スマホゲーム全般</option>
                    </select>
                </div>
                <button class="btn-premium" id="gen-btn" onclick="buildAISchedule()">カレンダーと同期してプランを創出</button>
            </section>
        </div>

        <div id="page-setting" class="app-page">
            <section class="card">
                <div class="section-title">GEOGRAPHY & SECURITY</div>
                <div class="form-group">
                    <label>📍 都道府県</label>
                    <select id="pref-select" onchange="updateCities()" style="margin-bottom: 10px;"></select>
                    <label>🏙️ 主要都市</label>
                    <select id="city-select"></select>
                </div>
                <button class="btn-premium" style="background: var(--border); color: white; box-shadow: none; margin-bottom: 20px;" onclick="saveLocation()">場所を適用</button>

                <div class="form-group">
                    <label>🔑 Groq API Key</label>
                    <input type="text" id="api-key" placeholder="gsk_...">
                </div>
            </section>
        </div>

    </div>

    <div class="modal" id="event-modal">
        <div class="modal-content">
            <h4 style="font-size: 14px; font-weight: 800; margin-bottom: 12px;" id="modal-date-label">予定を直接追加</h4>
            <div class="form-group">
                <label>予定のタイトル</label>
                <input type="text" id="modal-event-title" placeholder="学校、バイト、デートなど">
            </div>
            <div class="form-group">
                <label>時間帯</label>
                <input type="text" id="modal-event-time" placeholder="例: 13:00-16:00">
            </div>
            <div style="display: flex; gap: 8px; margin-top: 16px;">
                <button class="btn-premium" style="background: rgba(255,255,255,0.05); box-shadow: none;" onclick="closeModal()">戻る</button>
                <button class="btn-premium" onclick="saveDirectEvent()">予定を確定</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home', this)"><i class="fa-solid fa-house"></i>HOME</button>
        <button class="nav-item" onclick="switchTab('calendar', this)"><i class="fa-solid fa-calendar-days"></i>CALENDAR</button>
        <button class="nav-item" onclick="switchTab('plan', this)"><i class="fa-solid fa-wand-magic-sparkles"></i>PLAN</button>
        <button class="nav-item" onclick="switchTab('setting', this)"><i class="fa-solid fa-gear"></i>SETTING</button>
    </nav>

    <script>
        const geoMaster = {
            "北海道": ["札幌市", "函館市", "旭川市"], "青森県": ["青森市", "弘前市"], "岩手県": ["盛岡市"], "宮城県": ["仙台市", "石巻市"],
            "秋田県": ["秋田市"], "山形県": ["山形市"], "福島県": ["福島市", "郡山市"], "茨城県": ["水戸市", "つくば市"],
            "栃木県": ["宇都宮市"], "群馬県": ["高崎市"], "埼玉県": ["さいたま市", "大宮"], "千葉県": ["千葉市", "船橋市"],
            "東京都": ["新宿区", "渋谷区", "池袋", "町田市"], "神奈川県": ["横浜市", "川崎市", "藤沢市"], "新潟県": ["新潟市"],
            "富山県": ["富山市"], "石川県": ["金沢市"], "福井県": ["福井市"], "山梨県": ["甲府市"], "長野県": ["長野市", "松本市"],
            "岐阜県": ["岐阜市"], "静岡県": ["静岡市", "浜松市"], "愛知県": ["名古屋市", "豊田市"], "三重県": ["津市"],
            "滋賀県": ["大津市"], "京都府": ["京都市"], "大阪府": ["梅田", "難波", "天王寺"], "兵庫県": ["神戸市", "姫路市"],
            "奈良県": ["奈良市"], "和歌山県": ["和歌山市"], "鳥取県": ["鳥取市"], "島根県": ["松江市"], "岡山県": ["岡山市"],
            "広島県": ["広島市", "福山市"], "山口県": ["山口市"], "徳島県": ["徳島市"], "香川県": ["高松市"], "愛媛県": ["松山市"],
            "高知県": ["高知市"], "福岡県": ["福岡市", "小倉", "天神"], "佐賀県": ["佐賀市"], "長崎県": ["長崎市"],
            "熊本県": ["熊本市"], "大分県": ["大分市"], "宮崎県": ["宮崎市"], "鹿児島県": ["鹿児島市"], "沖縄県": ["那覇市"]
        };

        let currentCalendarDate = new Date();
        let selectedDateKey = "";

        window.onload = () => {
            const pSel = document.getElementById('pref-select');
            Object.keys(geoMaster).forEach(p => {
                let o = document.createElement('option'); o.value = p; o.innerText = p; pSel.appendChild(o);
            });
            updateCities();
            renderCalendarView();
            
            const today = new Date();
            document.getElementById('timeline-date-label').innerText = `${today.getMonth()+1}月${today.getDate()}日 SCHEDULE`;
        };

        function updateCities() {
            const pref = document.getElementById('pref-select').value;
            const cSel = document.getElementById('city-select');
            cSel.innerHTML = "";
            if(pref) geoMaster[pref].forEach(c => { let o = document.createElement('option'); o.value = c; o.innerText = c; cSel.appendChild(o); });
        }

        function saveLocation() { alert("設定を保存しました。"); }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(`page-${tabId}`).classList.add('active');
            btn.classList.add('active');
            if(tabId === 'calendar') renderCalendarView();
        }

        // カレンダーシステム
        function moveMonth(dir) { currentCalendarDate.setMonth(currentCalendarDate.getMonth() + dir); renderCalendarView(); }
        
        function renderCalendarView() {
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = "";
            const year = currentCalendarDate.getFullYear(); const month = currentCalendarDate.getMonth();
            document.getElementById('calendar-title').innerText = `${year}年 ${month + 1}月`;
            
            ["日","月","火","水","木","金","土"].forEach(w => { let l = document.createElement('div'); l.className = 'weekday-label'; l.innerText = w; grid.appendChild(l); });
            const firstDay = new Date(year, month, 1).getDay(); const lastDate = new Date(year, month + 1, 0).getDate();
            const events = JSON.parse(localStorage.getItem('tp17_events') || '{}');

            for (let i = 0; i < firstDay; i++) { let emp = document.createElement('div'); emp.className = 'calendar-cell'; emp.style.opacity = 0; grid.appendChild(emp); }
            const today = new Date();
            for (let d = 1; d <= lastDate; d++) {
                let cell = document.createElement('div'); cell.className = 'calendar-cell'; cell.innerHTML = `<div>${d}</div><div class="cell-dots"></div>`;
                const dateKey = `${year}-${month+1}-${d}`;
                if(events[dateKey]) { cell.classList.add('has-events'); cell.querySelector('.cell-dots').innerHTML = `<div class="dot"></div>`; }
                if(year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) cell.classList.add('today');
                cell.onclick = () => {
                    selectedDateKey = dateKey;
                    document.getElementById('modal-date-label').innerText = `${month+1}月${d}日の予定を編集`;
                    const saved = events[dateKey] || {title: "", time: ""};
                    document.getElementById('modal-event-title').value = saved.title;
                    document.getElementById('modal-event-time').value = saved.time;
                    document.getElementById('event-modal').style.display = 'flex';
                };
                grid.appendChild(cell);
            }
        }

        function closeModal() { document.getElementById('event-modal').style.display = 'none'; }
        
        function saveDirectEvent() {
            const title = document.getElementById('modal-event-title').value;
            const time = document.getElementById('modal-event-time').value;
            let events = JSON.parse(localStorage.getItem('tp17_events') || '{}');
            if(title) { events[selectedDateKey] = { title, time }; } else { delete events[selectedDateKey]; }
            localStorage.setItem('tp17_events', JSON.stringify(events));
            closeModal(); renderCalendarView();
        }

        // AI最適化コア
        async function buildAISchedule() {
            const apiKey = document.getElementById('api-key').value.trim();
            const app = document.getElementById('target-app').value;
            const city = document.getElementById('city-select').value || "設定地域";
            
            const today = new Date();
            const todayKey = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
            const events = JSON.parse(localStorage.getItem('tp17_events') || '{}');
            const userEvent = events[todayKey] || {title: "フリータイム", time: "終日"};

            const btn = document.getElementById('gen-btn');
            btn.disabled = true; btn.innerText = "MGA風にプランニング中...";

            const systemPrompt = `あなたはTimePilotの時間制限コーチ。ユーザー自作の『${userEvent.title} (${userEvent.time})』を解析し、天敵アプリ『${app}』への依存を断ち切るプランを作って。JSONのみを出力してください。
            {
              "bubble": "今日の全体の総評・注意すべき誘惑タイミングや天気アドバイスの一言（150文字以内）",
              "timeline": [
                {"time": "時間", "title": "予定名", "desc": "具体的なスマホ対策行動", "active": true}
              ]
            }`;

            if(apiKey) {
                try {
                    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{role: "user", content: systemPrompt}], response_format: {type: "json_object"} })
                    });
                    const data = await res.json();
                    renderResult(JSON.parse(data.choices[0].message.content));
                } catch(e) { loadMock(app, city, userEvent); }
            } else {
                setTimeout(() => loadMock(app, city, userEvent), 1000);
            }
            btn.disabled = false; btn.innerText = "カレンダーと同期してプランを創出";
            switchTab('home', document.querySelectorAll('.nav-item')[0]);
        }

        function loadMock(app, city, userEvent) {
            const mock = {
                bubble: `✦ 【AI分析】${city}は午後から集中に適した気候に。自作予定『${userEvent.title}』の終了直後、ホッとした瞬間に『${app}』を開いてしまいがちなので、そこが本日の魔の時間帯です。`,
                timeline: [
                    {time: "09:00", title: "プレ・デトックス 📱", desc: "スマホを画面を伏せて部屋の隅に置く。", active: true},
                    {time: userEvent.time, title: `自作予定: ${userEvent.title}`, desc: "TimeTreeから同期中。この間は完全にスマホを封印。", active: false},
                    {time: "予定直後", title: "プロテクト・クエスト 🔥", desc: "アプリを開く代わりに、お気に入りの曲を1曲聴いて脳をリフレッシュ。", active: true}
                ]
            };
            renderResult(mock);
        }

        function triggerSOS() {
            const sos = {
                bubble: `🚨 【SOS救済モード】誘惑に負けても大丈夫。AIが今この瞬間からの逆転タイムラインを再構築しました。切り替えていきましょう！`,
                timeline: [
                    {time: "今すぐ", title: "リセットブレス 🧠", desc: "深呼吸して、スマホの電源を10分間オフにする。", active: true},
                    {time: "15分後〜", title: "小さく始める集中枠", desc: "次の予定に向けて、まずは一番軽いタスクを15分だけ進める。", active: true}
                ]
            };
            renderResult(sos);
            switchTab('home', document.querySelectorAll('.nav-item')[0]);
        }

        function renderResult(data) {
            document.getElementById('home-ai-text').innerText = data.bubble;
            const list = document.getElementById('timeline-list'); list.innerHTML = "";
            data.timeline.forEach(t => {
                let item = document.createElement('div'); item.className = `timeline-item ${t.active ? 'active' : ''}`;
                item.innerHTML = `<div class="tl-time">${t.time}</div><div class="tl-title">${t.title}</div><div class="tl-desc">${t.desc}</div>`;
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>
