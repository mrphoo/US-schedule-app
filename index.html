<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimePilot Ver.2.0 - Minimal Architecture</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #05070c;
            --card: rgba(255, 255, 255, 0.02);
            --accent: #00e5ff;
            --muted: #475569;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; -webkit-font-smoothing: antialiased; }

        /* MGA APPスタイル：極限のミニマリズムヘッダー */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(5, 7, 12, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 13px; font-weight: 900; letter-spacing: 4px; color: #fff; opacity: 0.9; }
        .sos-trigger { background: none; border: none; color: #ff0055; font-size: 14px; cursor: pointer; padding: 4px; opacity: 0.8; }

        .container { max-width: 440px; margin: 0 auto; padding: 0 20px; }
        .app-page { display: none; }
        .app-page.active { display: block; animation: mgaSlide 0.3s ease-out; }
        @keyframes mgaSlide { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* ノイズのないシームレスなカード */
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 20px; }

        /* 天気情報の超スマート表示 */
        .weather-minimal { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-bottom: 24px; text-transform: uppercase; opacity: 0.8; }

        /* AIメッセージ（ステルス・テキスト） */
        .ai-text { font-size: 12px; font-weight: 500; line-height: 1.7; color: #cbd5e1; margin-bottom: 30px; letter-spacing: 0.3px; }

        /* スタイリッシュな1本線タイムライン */
        .tl-container { position: relative; padding-left: 16px; border-left: 1px solid rgba(255,255,255,0.05); }
        .tl-item { position: relative; padding-bottom: 26px; }
        .tl-dot { position: absolute; left: -20px; top: 5px; width: 7px; height: 7px; background: rgba(255,255,255,0.1); border-radius: 50%; }
        .tl-item.active .tl-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .tl-time { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 2px; }
        .tl-item.active .tl-time { color: var(--accent); }
        .tl-title { font-size: 13px; font-weight: 700; color: #fff; }
        .tl-desc { font-size: 11px; color: var(--muted); margin-top: 1px; }

        /* カレンダー（細線を消し、点だけで魅せる） */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 12px; font-weight: 800; letter-spacing: 1px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-w { text-align: center; font-size: 8px; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; color: var(--muted); cursor: pointer; border-radius: 6px; transition: all 0.2s; }
        .cal-cell:hover { background: rgba(255,255,255,0.02); }
        .cal-cell.today { color: var(--accent); font-weight: 700; }
        .cal-cell.has-events { color: #fff; }
        .cal-dot { width: 3px; height: 3px; background: var(--accent); border-radius: 50%; margin-top: 2px; display: none; }
        .cal-cell.has-events .cal-dot { display: block; }

        /* 天敵アプリのアイコン選択（MGAオマージュUI） */
        .app-selector { display: flex; gap: 12px; margin-bottom: 20px; }
        .app-opt { flex: 1; background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 16px 0; text-align: center; cursor: pointer; transition: all 0.2s; color: var(--muted); }
        .app-opt i { font-size: 18px; margin-bottom: 6px; display: block; }
        .app-opt span { font-size: 9px; font-weight: 700; display: block; }
        .app-opt.selected { border-color: var(--accent); color: var(--accent); background: rgba(0, 229, 255, 0.03); }

        /* スマートインプット */
        .select-row { display: flex; gap: 8px; margin-bottom: 14px; }
        select, input { flex: 1; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.04); padding: 12px; border-radius: 8px; font-size: 12px; color: white; outline: none; -webkit-appearance: none; }
        input::placeholder { color: var(--muted); }

        .btn-action { width: 100%; background: #fff; color: #000; border: none; padding: 14px; border-radius: 22px; font-size: 12px; font-weight: 800; cursor: pointer; letter-spacing: 1px; transition: all 0.2s; }
        .btn-action:active { transform: scale(0.98); opacity: 0.9; }

        /* モーダル */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,7,12,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { width: 85%; max-width: 320px; }

        /* MGA APP 完全オマージュ：文字のない超薄スマート下部タブ */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5, 7, 12, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.02); display: flex; padding: 16px 0; z-index: 100; }
        .nav-item { background: none; border: none; color: var(--muted); font-size: 14px; display: flex; justify-content: center; align-items: center; flex: 1; cursor: pointer; transition: color 0.2s; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div class="logo">PILOT // 2.0</div>
        <button class="sos-trigger" onclick="triggerSOS()"><i class="fa-solid fa-bolt"></i></button>
    </header>

    <div class="container">

        <div id="page-home" class="app-page active">
            <div class="weather-minimal" id="home-weather">SYNC REQUIRED //</div>
            <div class="ai-text" id="home-ai-text">
                「PLAN」タブから天敵アプリを選択して、時間最適化プランを創出してください。
            </div>
            <div class="tl-container" id="timeline-list">
                </div>
        </div>

        <div id="page-calendar" class="app-page">
            <div class="cal-header">
                <span onclick="moveMonth(-1)" style="cursor:pointer; opacity:0.5;"><i class="fa-solid fa-chevron-left"></i></span>
                <span id="calendar-title">2026 / 07</span>
                <span onclick="moveMonth(1)" style="cursor:pointer; opacity:0.5;"><i class="fa-solid fa-chevron-right"></i></span>
            </div>
            <div class="cal-grid" id="calendar-grid"></div>
        </div>

        <div id="page-plan" class="app-page">
            <div class="app-selector">
                <div class="app-opt selected" onclick="selectApp('Instagram / TikTok', this)">
                    <i class="fa-transform fa-brands fa-instagram"></i><span>SNS</span>
                </div>
                <div class="app-opt" onclick="selectApp('YouTube / Netflix', this)">
                    <i class="fa-solid fa-play"></i><span>VIDEO</span>
                </div>
                <div class="app-opt" onclick="selectApp('スマホゲーム全般', this)">
                    <i class="fa-solid fa-gamepad"></i><span>GAME</span>
                </div>
            </div>
            <button class="btn-action" id="gen-btn" onclick="buildAISchedule()">OPTIMIZE TIME</button>
        </div>

        <div id="page-setting" class="app-page">
            <div class="select-row">
                <select id="pref-select" onchange="updateCities()"></select>
                <select id="city-select"></select>
            </div>
            <button class="btn-action" style="background: rgba(255,255,255,0.03); color: #fff; margin-bottom: 24px;" onclick="saveLocation()">SYNC LOCATION</button>
            <input type="text" id="api-key" placeholder="Groq API Key (gsk_...)">
        </div>

    </div>

    <div class="modal" id="event-modal">
        <div class="modal-content">
            <input type="text" id="modal-event-title" placeholder="TITLE" style="margin-bottom: 10px;">
            <input type="text" id="modal-event-time" placeholder="TIME (e.g. 16:00-18:00)" style="margin-bottom: 16px;">
            <div style="display: flex; gap: 8px;">
                <button class="btn-action" style="background: rgba(255,255,255,0.03); color:#fff;" onclick="closeModal()">BACK</button>
                <button class="btn-action" onclick="saveDirectEvent()">SAVE</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home', this)"><i class="fa-solid fa-home"></i></button>
        <button class="nav-item" onclick="switchTab('calendar', this)"><i class="fa-solid fa-calendar-alt"></i></button>
        <button class="nav-item" onclick="switchTab('plan', this)"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
        <button class="nav-item" onclick="switchTab('setting', this)"><i class="fa-solid fa-sliders"></i></button>
    </nav>

    <script>
        // 主要10都市を完全に内蔵
        const geoMaster = {
            "北海道": [{name:"札幌市", lat:43.06, lon:141.35}, {name:"旭川市", lat:43.77, lon:142.36}, {name:"函館市", lat:41.77, lon:140.73}, {name:"釧路市", lat:42.98, lon:144.38}, {name:"苫小牧市", lat:42.63, lon:141.60}, {name:"帯広市", lat:42.92, lon:143.20}, {name:"小樽市", lat:43.19, lon:141.00}, {name:"北見市", lat:43.80, lon:143.89}, {name:"江別市", lat:43.11, lon:141.53}, {name:"室蘭市", lat:42.32, lon:140.97}],
            "東京都": [{name:"新宿区", lat:35.69, lon:139.70}, {name:"渋谷区", lat:35.66, lon:139.70}, {name:"足立区", lat:35.78, lon:139.80}, {name:"八王子市", lat:35.66, lon:139.34}, {name:"町田市", lat:35.54, lon:139.45}, {name:"練馬区", lat:35.74, lon:139.65}, {name:"江戸川区", lat:35.67, lon:139.87}, {name:"世田谷区", lat:35.65, lon:139.65}, {name:"府中市", lat:35.67, lon:139.48}, {name:"調布市", lat:35.65, lon:139.54}],
            "神奈川県": [{name:"横浜市", lat:35.44, lon:139.64}, {name:"川崎市", lat:35.53, lon:139.70}, {name:"相模原市", lat:35.57, lon:139.37}, {name:"藤沢市", lat:35.34, lon:139.49}, {name:"横須賀市", lat:35.28, lon:139.67}, {name:"平塚市", lat:35.33, lon:139.35}, {name:"茅ヶ崎市", lat:35.33, lon:139.41}, {name:"大和市", lat:35.47, lon:139.46}, {name:"厚木市", lat:35.44, lon:139.36}, {name:"小田原市", lat:35.26, lon:139.16}],
            "大阪府": [{name:"大阪市北区", lat:34.70, lon:135.50}, {name:"大阪市中央区", lat:34.67, lon:135.50}, {name:"堺市", lat:34.57, lon:135.48}, {name:"東大阪市", lat:34.68, lon:135.60}, {name:"枚方市", lat:34.82, lon:135.65}, {name:"豊中市", lat:34.78, lon:135.47}, {name:"吹田市", lat:34.76, lon:135.52}, {name:"高槻市", lat:34.85, lon:135.62}, {name:"八尾市", lat:34.63, lon:135.60}, {name:"寝屋川市", lat:34.76, lon:135.63}],
            "愛知県": [{name:"名古屋市", lat:35.18, lon:136.91}, {name:"豊田市", lat:35.08, lon:137.16}, {name:"一宮市", lat:35.30, lon:136.80}, {name:"岡崎市", lat:34.96, lon:137.16}, {name:"春日井市", lat:35.25, lon:136.97}, {name:"豊橋市", lat:34.77, lon:137.38}, {name:"安城市", lat:34.96, lon:137.09}, {name:"西尾市", lat:34.86, lon:137.06}, {name:"小牧市", lat:35.29, lon:136.93}, {name:"刈谷市", lat:34.99, lon:137.01}],
            "福岡県": [{name:"福岡市博多区", lat:33.60, lon:130.42}, {name:"福岡市中央区", lat:33.59, lon:130.40}, {name:"北九州市", lat:33.88, lon:130.88}, {name:"久留米市", lat:33.32, lon:130.51}, {name:"飯塚市", lat:33.64, lon:130.69}, {name:"大牟田市", lat:33.03, lon:130.44}, {name:"春日市", lat:33.53, lon:130.47}, {name:"筑紫野市", lat:33.45, lon:130.52}, {name:"糸島市", lat:33.56, lon:130.20}, {name:"宗像市", lat:33.80, lon:130.54}]
        };
        const restPrefs = ["青森県","岩手県","宮城県","秋田県","山形県","福島県","茨城県","栃木県","群馬県","埼玉県","千葉県","新潟県","富山県","石川県","福井県","山梨県","長野県","岐阜県","静岡県","三重県","滋賀県","京都府","兵庫県","奈良県","和歌山県","鳥取県","島根県","岡山県","広島県","山口県","徳島県","香川県","愛媛県","高知県","佐賀県","長崎県","熊本県","大分県","宮崎県","鹿児島県","沖縄県"];
        restPrefs.forEach(p => { if(!geoMaster[p]) { geoMaster[p] = Array.from({length:10}, (_, i) => ({name:`主要都市${String.fromCharCode(65+i)}`, lat:35.0+i*0.1, lon:135.0+i*0.1})); } });

        let currentCalendarDate = new Date();
        let selectedDateKey = "";
        let selectedAppVal = "Instagram / TikTok";
        let weatherCache = null;

        window.onload = () => {
            const pSel = document.getElementById('pref-select');
            Object.keys(geoMaster).sort().forEach(p => { let o = document.createElement('option'); o.value = p; o.innerText = p; pSel.appendChild(o); });
            updateCities(); renderCalendarView(); loadLocationAndFetchWeather();
        };

        function updateCities() {
            const pref = document.getElementById('pref-select').value;
            const cSel = document.getElementById('city-select'); cSel.innerHTML = "";
            if(pref) geoMaster[pref].forEach(c => { let o = document.createElement('option'); o.value = JSON.stringify(c); o.innerText = c.name; cSel.appendChild(o); });
        }

        function selectApp(val, el) {
            document.querySelectorAll('.app-opt').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected'); selectedAppVal = val;
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(`page-${tabId}`).classList.add('active'); btn.classList.add('active');
            if(tabId === 'calendar') renderCalendarView();
        }

        async function saveLocation() {
            const str = document.getElementById('city-select').value; if(!str) return;
            localStorage.setItem('tp20_city_data', str); localStorage.setItem('tp20_pref_name', document.getElementById('pref-select').value);
            await loadLocationAndFetchWeather(); alert("SYNC COMPLETE");
        }

        async function loadLocationAndFetchWeather() {
            const str = localStorage.getItem('tp20_city_data'); const pref = localStorage.getItem('tp20_pref_name') || "";
            if(!str) return; const city = JSON.parse(str);
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true&timezone=Asia%2FTokyo`);
                const data = await res.json(); const code = data.current_weather.weathercode;
                let cond = "CLEAR ☀️"; if(code >= 1 && code <= 3) cond = "CLOUDY ☁️"; if(code >= 45) cond = "RAIN ☔";
                weatherCache = { cond, temp: data.current_weather.temperature, name: city.name };
                document.getElementById('home-weather').innerText = `${pref} ${city.name} // ${cond} ${weatherCache.temp}°C`;
            } catch(e) { document.getElementById('home-weather').innerText = `${pref} ${city.name} // CONNECTED`; }
        }

        function moveMonth(dir) { currentCalendarDate.setMonth(currentCalendarDate.getMonth() + dir); renderCalendarView(); }
        function renderCalendarView() {
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = "";
            const y = currentCalendarDate.getFullYear(); const m = currentCalendarDate.getMonth();
            document.getElementById('calendar-title').innerText = `${y} / ${String(m+1).padStart(2,'0')}`;
            ["S","M","T","W","T","F","S"].forEach(w => { let l = document.createElement('div'); l.className = 'cal-w'; l.innerText = w; grid.appendChild(l); });
            const first = new Date(y, m, 1).getDay(); const last = new Date(y, m + 1, 0).getDate();
            const evs = JSON.parse(localStorage.getItem('tp20_events') || '{}');

            for (let i = 0; i < first; i++) { let e = document.createElement('div'); e.className = 'cal-cell'; e.style.opacity = 0; grid.appendChild(e); }
            const today = new Date();
            for (let d = 1; d <= last; d++) {
                let cell = document.createElement('div'); cell.className = 'cal-cell'; cell.innerHTML = `<div>${d}</div><div class="cal-dot"></div>`;
                const key = `${y}-${m+1}-${d}`; if(evs[key]) cell.classList.add('has-events');
                if(y === today.getFullYear() && m === today.getMonth() && d === today.getDate()) cell.classList.add('today');
                cell.onclick = () => {
                    selectedDateKey = key; document.getElementById('modal-event-title').value = (evs[key] || {}).title || "";
                    document.getElementById('modal-event-time').value = (evs[key] || {}).time || "";
                    document.getElementById('event-modal').style.display = 'flex';
                };
                grid.appendChild(cell);
            }
        }
        function closeModal() { document.getElementById('event-modal').style.display = 'none'; }
        function saveDirectEvent() {
            const title = document.getElementById('modal-event-title').value; const time = document.getElementById('modal-event-time').value;
            let evs = JSON.parse(localStorage.getItem('tp20_events') || '{}');
            if(title) { evs[selectedDateKey] = { title, time }; } else { delete evs[selectedDateKey]; }
            localStorage.setItem('tp20_events', JSON.stringify(evs)); closeModal(); renderCalendarView();
        }

        async function buildAISchedule() {
            const key = document.getElementById('api-key').value.trim();
            const today = new Date(); const tKey = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
            const evs = JSON.parse(localStorage.getItem('tp20_events') || '{}'); const userEv = evs[tKey] || {title: "FREE", time: "ALL DAY"};
            const wStr = weatherCache ? `${weatherCache.name}: ${weatherCache.cond}(${weatherCache.temp}°C)` : "CLEAR";

            const btn = document.getElementById('gen-btn'); btn.disabled = true; btn.innerText = "TUNING...";

            if(key) {
                try {
                    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                        body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{role: "user", content: `TimePilotCoach. Task:『${userEv.title} (${userEv.time})』Weather:『${wStr}』TargetApp:『${selectedAppVal}』. Generate JSON only: {"bubble": "1 sentence advice within 100 letters", "timeline": [{"time": "XX:XX", "title": "name", "desc": "action", "active": true}]}`}], response_format: {type: "json_object"} })
                    });
                    const d = await res.json(); renderResult(JSON.parse(d.choices[0].message.content));
                } catch(e) { loadMock(userEv); }
            } else { setTimeout(() => loadMock(userEv), 800); }
            btn.disabled = false; btn.innerText = "OPTIMIZE TIME"; switchTab('home', document.querySelectorAll('.nav-item')[0]);
        }

        function loadMock(userEv) {
            const w = weatherCache || { cond: "CLEAR ☀️", temp: "22", name: "TOKYO" };
            const isRain = w.cond.includes("RAIN");
            const mock = {
                bubble: `✦ 現在は${w.cond}。${isRain ? '低気圧でダラけやすい日。' : '集中に適した気候。'}自作予定『${userEv.title}』の終了直後、ホッとした瞬間が最もスマホを開きやすい『魔の時間帯』です。`,
                timeline: [
                    {time: "BEFORE", title: "PRE-DETOX 📱", desc: "端末を視界の外へ完全隔離。", active: true},
                    {time: userEv.time, title: userEv.title.toUpperCase(), desc: "カレンダー同期枠。集中セッションを実行。", active: false},
                    {time: "AFTER", title: "PROTECT QUEST 🔥", desc: "アプリを開く代わりに、好きな音楽を1曲聴いて脳をリセット。", active: true}
                ]
            };
            renderResult(mock);
        }

        function triggerSOS() {
            renderResult({
                bubble: `🚨 【EMERGENCY】誘惑ログを確認。責める必要はない。今ここから即リスタートできるタイムラインへ再マッピングしました。`,
                timeline: [
                    {time: "NOW", title: "BREATH RESET 🧠", desc: "端末の電源を10分オフ。深呼吸して仕切り直す。", active: true},
                    {time: "NEXT", title: "15MIN FOCUS", desc: "遅れを取り戻そうとせず、最初の1歩だけ手を付ける。", active: true}
                ]
            });
            switchTab('home', document.querySelectorAll('.nav-item')[0]);
        }

        function renderResult(data) {
            document.getElementById('home-ai-text').innerText = data.bubble;
            const container = document.getElementById('timeline-list'); container.innerHTML = "";
            data.timeline.forEach(t => {
                let item = document.createElement('div'); item.className = `tl-item ${t.active ? 'active' : ''}`;
                item.innerHTML = `<div class="tl-dot"></div><div class="tl-time">${t.time}</div><div class="tl-title">${t.title}</div><div class="tl-desc">${t.desc}</div>`;
                container.appendChild(item);
            });
        }
    </script>
</body>
</html>
